{% if paginator.total_pages > 1 %}
<div class="paginator-jump" style="text-align: center; margin-top: 1em;">
  <label for="page-jump-input" style="font-size: 0.85em;">
    {{ paginator.page }} / {{ paginator.total_pages }} 페이지
  </label>
  <input type="number" id="page-jump-input" min="1" max="{{ paginator.total_pages }}" placeholder="페이지 번호" style="width: 80px; padding: 4px 8px; font-size: 0.85em; border: 1px solid #ccc; border-radius: 4px;">
  <button id="page-jump-btn" style="padding: 4px 12px; font-size: 0.85em; border: 1px solid #ccc; border-radius: 4px; cursor: pointer;">이동</button>
</div>
<script>
(function() {
  var totalPages = {{ paginator.total_pages }};
  var btn = document.getElementById('page-jump-btn');
  var input = document.getElementById('page-jump-input');
  function jump() {
    var page = parseInt(input.value, 10);
    if (isNaN(page) || page < 1 || page > totalPages) {
      alert('1~' + totalPages + ' 사이의 페이지 번호를 입력하세요.');
      return;
    }
    if (page === 1) {
      window.location.href = '{{ "/" | relative_url }}';
    } else {
      window.location.href = '{{ "/page" | relative_url }}' + page + '/';
    }
  }
  btn.addEventListener('click', jump);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') jump();
  });
})();
</script>
{% endif %}
