<div class="paginator-jump">
  <span class="paginator-jump__info">{{ paginator.page }} / {{ paginator.total_pages }}p</span>
  <input type="number" id="page-jump-input"
         min="1" max="{{ paginator.total_pages }}"
         aria-label="페이지 번호 입력">
  <button id="page-jump-btn" aria-label="해당 페이지로 이동">이동</button>
</div>
<script>
(function() {
  var totalPages = {{ paginator.total_pages }};
  var btn = document.getElementById('page-jump-btn');
  var input = document.getElementById('page-jump-input');
  function jump() {
    var page = parseInt(input.value, 10);
    if (isNaN(page) || page < 1 || page > totalPages) {
      alert('1~' + totalPages + ' 사이의 페이지 번호를 입력하세요.');
      return;
    }
    window.location.href = page === 1
      ? '{{ "/" | relative_url }}'
      : '{{ "/page" | relative_url }}' + page + '/';
  }
  btn.addEventListener('click', jump);
  input.addEventListener('keydown', function(e) { if (e.key === 'Enter') jump(); });
})();
</script>
