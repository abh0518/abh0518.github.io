---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
  {% if page.categories.size > 0 %}
  <span class="categories">{{ page.categories | join: ", " }}</span>
  {% endif %}
  {% if page.tags.size > 0 %}
  <span class="tags">{{ page.tags | join: ", " }}</span>
  {% endif %}
  <div class="post-content">
    {{ content }}
  </div>
</article>
